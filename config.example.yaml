tool_result_optimizer:
  enabled: true
  telemetry:
    enabled: true
  compression:
    enabled: true
    min_chars: 12000
    mode: preview_store
    preview_head_chars: 3000
    preview_tail_chars: 3000
  storage:
    enabled: true
    retention_days: 14
  tools:
    terminal:
      mode: terminal_evidence
      success_min_chars: 8000
      failure_min_chars: 12000
      stdout_head_chars: 500
      stdout_tail_chars: 6000
      stderr_tail_chars: 10000
      error_context_lines: 3
      max_error_lines: 80
      max_warning_lines: 40
      max_final_lines: 30
    web_extract:
      min_chars: 12000
      mode: preview_store
      preview_head_chars: 4000
      preview_tail_chars: 4000
    skill_view:
      min_chars: 8000
      mode: preview_store
      preview_head_chars: 2500
      preview_tail_chars: 2500
    browser_snapshot:
      min_chars: 10000
      mode: preview_store
      preview_head_chars: 3000
      preview_tail_chars: 3000
    browser_navigate:
      min_chars: 10000
      mode: preview_store
      preview_head_chars: 3000
      preview_tail_chars: 3000
    patch:
      mode: patch_diff_evidence
      success_min_chars: 4000
      first_hunks_per_file: 2
      last_hunks_per_file: 1
      max_hunks_per_file: 8
      max_hunk_chars: 12000
    default:
      min_chars: 12000
      mode: preview_store
      preview_head_chars: 3000
      preview_tail_chars: 3000
